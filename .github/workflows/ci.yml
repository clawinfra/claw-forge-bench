name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check bench/ scripts/ tests/

      - name: Unit tests
        run: uv run pytest tests/ -q

      - name: Validate tasks
        run: uv run python scripts/validate_tasks.py

      - name: Dry run
        run: uv run python scripts/run_bench.py --dry-run --config A
